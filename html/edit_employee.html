<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать сотрудника</title>
    <link rel="stylesheet" href="/css/edit_employee.css">
    <link rel="stylesheet" href="/css/loader.css">
</head>
<body>

<div class="modal">
    <div class="icon">✏️</div>
    <h2>Редактировать сотрудника</h2>
    <p class="subtitle" id="edit-subtitle"></p>
    
    <input type="hidden" id="edit-id">
    <input type="hidden" id="current-user-role">
    
    <div class="form-group">
        <label for="full_name">ФИО</label>
        <input type="text" id="full_name" placeholder="Иванов Иван Иванович">
    </div>
    
    <div class="form-group">
        <label for="hire_date">Дата приема</label>
        <input type="text" id="hire_date" placeholder="ДД.ММ.ГГГГ" maxlength="10" oninput="formatDate(this)">
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="position">Должность</label>
            <input type="text" id="position" placeholder="Менеджер">
        </div>
        <div class="form-group">
            <label for="department">Отдел</label>
            <input type="text" id="department" placeholder="Отдел продаж">
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="phone">Телефон</label>
            <input type="tel" id="phone" placeholder="+7 900 123-45-67" oninput="formatPhone(this)">
        </div>
        <div class="form-group">
            <label for="email">Почта</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="login">Логин</label>
            <input type="text" id="login" placeholder="Логин">
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="Пароль">
        </div>
    </div>
    
    <div class="buttons">
        <button class="btn btn-cancel" onclick="window.history.back()">Отмена</button>
        <button class="btn btn-info" onclick="editExtraInfo()">Редактировать доп. информацию</button>
        <button class="btn btn-save" onclick="saveEdit()">Сохранить</button>
    </div>
</div>

<script src="/js/loader.js"></script>
<script>
const currentUser = JSON.parse(sessionStorage.getItem('user') || '{}');
const params = new URLSearchParams(window.location.search);
const empId = parseInt(params.get('id'));

if (!empId) {
    alert('ID сотрудника не указан');
    window.location.href = '/html/dashboard.html';
}

showLoader('Загрузка данных...');

fetch('/api/get_employees', {method:'POST'})
    .then(r => r.json())
    .then(d => {
        const emp = d.employees.find(e => e.id === empId);
        if (!emp) {
            hideLoader();
            alert('Сотрудник не найден');
            window.location.href = '/html/dashboard.html';
            return;
        }
        
        let canEdit = false;
        if (currentUser.role === 'admin') {
            canEdit = true;
        } else if (currentUser.role === 'junior_admin') {
            canEdit = emp.role !== 'admin';
        } else if (currentUser.role === 'hr') {
            canEdit = emp.role !== 'admin' && emp.role !== 'junior_admin';
        } else {
            canEdit = currentUser.id === emp.id;
        }
        
        if (!canEdit) {
            hideLoader();
            alert('Нет прав на редактирование');
            window.location.href = '/html/dashboard.html';
            return;
        }
        
        hideLoader();
        
        document.getElementById('edit-id').value = emp.id;
        document.getElementById('current-user-role').value = currentUser.role;
        document.getElementById('full_name').value = emp.full_name;
        document.getElementById('hire_date').value = emp.hire_date;
        document.getElementById('position').value = emp.position;
        document.getElementById('department').value = emp.department;
        document.getElementById('phone').value = emp.phone;
        document.getElementById('email').value = emp.email;
        document.getElementById('login').value = emp.login;
        document.getElementById('password').value = emp.password;
        document.getElementById('edit-subtitle').textContent = emp.full_name;
    })
    .catch(() => {
        hideLoader();
        alert('Ошибка соединения');
    });

function formatPhone(input) {
    let value = input.value.replace(/\D/g, '');
    if (value.startsWith('7') || value.startsWith('8')) value = value.substring(1);
    
    let formatted = '+7 ';
    if (value.length > 0) formatted += value.substring(0, 3);
    if (value.length > 3) formatted += ' ' + value.substring(3, 6);
    if (value.length > 6) formatted += '-' + value.substring(6, 8);
    if (value.length > 8) formatted += '-' + value.substring(8, 10);
    
    input.value = formatted;
}

function formatDate(input) {
    let value = input.value.replace(/\D/g, '');
    if (value.length >= 8) {
        input.value = value.substring(0,2) + '.' + value.substring(2,4) + '.' + value.substring(4,8);
    }
}

function editExtraInfo() {
    showLoader('Загрузка...');
    setTimeout(() => window.location.href = '/html/edit_extra_info.html?id=' + empId, 400);
}

function saveEdit() {
    const data = {
        id: parseInt(document.getElementById('edit-id').value),
        current_user_role: document.getElementById('current-user-role').value,
        current_user_name: currentUser.full_name,
        full_name: document.getElementById('full_name').value,
        hire_date: document.getElementById('hire_date').value,
        position: document.getElementById('position').value,
        department: document.getElementById('department').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        login: document.getElementById('login').value.trim(),
        password: document.getElementById('password').value
    };
    
    if (!data.full_name || !data.position || !data.department) {
        alert('Заполните обязательные поля: ФИО, Должность, Отдел');
        return;
    }
    
    showLoader('Сохранение...');
    
    fetch('/api/update_employee', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(res => {
        hideLoader();
        if (res.success) {
            alert('Изменения сохранены!');
            showLoader('Переход...');
            setTimeout(() => window.location.href = '/html/dashboard.html', 500);
        } else {
            alert('Ошибка: ' + (res.message || 'не удалось сохранить'));
        }
    })
    .catch(() => {
        hideLoader();
        alert('Ошибка соединения');
    });
}
</script>
</body>
</html>
