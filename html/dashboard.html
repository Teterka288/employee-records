<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личные дела</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/loader.css">
</head>
<body>

<div class="header">
    <h1>Личные дела</h1>
    <div class="header-right">
        <div class="user-block">
            <div class="user-name" id="h-name"></div>
            <div class="user-role" id="h-role"></div>
        </div>
        <button class="btn btn-white" id="logsBtn" style="display:none" onclick="window.location.href='/html/logs.html'">📋 Логи</button>
        <button class="btn btn-white" onclick="showLoader('Загрузка...'); setTimeout(() => window.location.href='/html/profile.html', 400)">Личный кабинет</button>
        <button class="btn btn-red" onclick="showLoader('Выход...'); setTimeout(() => { sessionStorage.removeItem('user'); window.location.href='/html/index.html'; }, 400)">Выйти</button>
    </div>
</div>

<div class="content">
    <div class="top-bar">
        <input type="text" id="search" placeholder="🔍 Поиск по всем полям..." oninput="filter()">
        <button class="btn btn-green" id="addBtn" style="display:none" onclick="showLoader('Загрузка...'); setTimeout(() => window.location.href='/html/add_employee.html', 400)">Добавить сотрудника</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>ФИО</th>
                <th>Дата</th>
                <th>Должность</th>
                <th>Отдел</th>
                <th>Телефон</th>
                <th>Почта</th>
                <th>Логин</th>
                <th id="passCol" style="display:none">Пароль</th>
                <th id="actionsCol" style="display:none">Действия</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script src="/js/loader.js"></script>
<script>
const u = JSON.parse(sessionStorage.getItem('user') || '{}');

if (!u.id) {
    window.location.href = '/html/index.html';
}

document.getElementById('h-name').textContent = u.full_name;
document.getElementById('h-role').textContent = u.position;

if (u.role === 'admin' || u.role === 'junior_admin') {
    document.getElementById('logsBtn').style.display = 'inline-block';
}

if (u.role === 'admin' || u.role === 'junior_admin' || u.role === 'hr') {
    document.getElementById('passCol').style.display = 'table-cell';
    document.getElementById('actionsCol').style.display = 'table-cell';
}

if (u.role === 'admin' || u.role === 'hr') {
    document.getElementById('addBtn').style.display = 'inline-block';
}

let employees = [];

fetch('/api/get_employees', {method:'POST'})
    .then(r => r.json())
    .then(d => { employees = d.employees; render(employees); })
    .catch(() => alert('Ошибка загрузки данных'));

function getRoleName(role) {
    if (role === 'admin') return 'Старший админ';
    if (role === 'junior_admin') return 'Младший админ';
    if (role === 'hr') return 'Кадровик';
    return 'Сотрудник';
}

function canEdit(emp) {
    if (u.role === 'admin') return true;
    if (u.role === 'junior_admin' && emp.role !== 'admin') return true;
    if (u.role === 'hr' && emp.role !== 'admin' && emp.role !== 'junior_admin') return true;
    if (u.id === emp.id) return true;
    return false;
}

function canDelete(emp) {
    if (u.role === 'admin') return emp.role !== 'admin';
    if (u.role === 'junior_admin') return emp.role === 'employee' || emp.role === 'hr';
    return false;
}

function canSeePassword(emp) {
    if (u.role === 'admin') return true;
    if (u.role === 'junior_admin') return emp.role !== 'admin';
    if (u.role === 'hr') return emp.role === 'employee' || emp.role === 'hr';
    return false;
}

function render(list) {
    document.getElementById('tbody').innerHTML = list.map(e => {
        const rowClass = (e.role === 'admin' || e.role === 'junior_admin') ? 'admin-row' : '';
        return `<tr class="${rowClass}">
            <td>${e.id}</td>
            <td><a href="/html/employee_profile.html?id=${e.id}" style="color: #2196F3; text-decoration: none;">${e.full_name}</a></td>
            <td>${e.hire_date}</td>
            <td>${e.position}</td>
            <td>${e.department}</td>
            <td>${e.phone}</td>
            <td>${e.email}</td>
            <td>${e.login}</td>
            ${(u.role === 'admin' || u.role === 'junior_admin' || u.role === 'hr') ? 
                (canSeePassword(e) ? '<td>'+e.password+'</td>' : '<td>••••••</td>') 
                : ''}
            ${(u.role === 'admin' || u.role === 'junior_admin' || u.role === 'hr') ? `<td>
                ${canEdit(e) ? `<button class="btn btn-blue btn-sm" onclick="showLoader('Загрузка...'); setTimeout(() => window.location.href='/html/edit_employee.html?id=${e.id}', 400)">✏️</button>` : ''}
                ${canDelete(e) ? `<button class="btn btn-red btn-sm" onclick="deleteEmployee(${e.id})">🗑️</button>` : ''}
            </td>` : ''}
        </tr>`;
    }).join('');
}

function filter() {
    const q = document.getElementById('search').value.toLowerCase();
    render(q ? employees.filter(e => Object.values(e).some(v => String(v).toLowerCase().includes(q))) : employees);
}

function deleteEmployee(id) {
    if (!confirm('Удалить сотрудника #' + id + '?')) return;
    
    showLoader('Удаление...');
    
    fetch('/api/delete_employee', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ 
            id: id, 
            current_user_role: u.role,
            current_user_name: u.full_name
        })
    })
    .then(r => r.json())
    .then(res => {
        hideLoader();
        if (res.success) {
            employees = employees.filter(e => e.id !== id);
            render(employees);
        } else {
            alert('Ошибка: ' + res.message);
        }
    })
    .catch(() => {
        hideLoader();
        alert('Ошибка соединения');
    });
}
</script>
</body>
</html>
